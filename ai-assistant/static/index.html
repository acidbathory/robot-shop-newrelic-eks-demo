<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Robot Shop — AI Assistant</title>
  <style>
    :root { --bg:#0f1419; --panel:#1a2027; --accent:#e8743b; --text:#e6e6e6; --muted:#8a949e; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; }
    header { padding:16px 20px; background:var(--panel); border-bottom:1px solid #2a313a; font-weight:600; }
    header span { color:var(--accent); }
    #log { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; }
    .msg { max-width:75%; padding:10px 14px; border-radius:12px; line-height:1.4; white-space:pre-wrap; }
    .user { align-self:flex-end; background:var(--accent); color:#111; }
    .bot { align-self:flex-start; background:var(--panel); border:1px solid #2a313a; }
    .meta { font-size:11px; color:var(--muted); margin-top:4px; }
    form { display:flex; gap:8px; padding:16px 20px; background:var(--panel); border-top:1px solid #2a313a; }
    input { flex:1; padding:12px; border-radius:8px; border:1px solid #2a313a; background:#0f1419; color:var(--text); font-size:14px; }
    button { padding:12px 20px; border:none; border-radius:8px; background:var(--accent); color:#111; font-weight:600; cursor:pointer; }
    button:disabled { opacity:.5; cursor:default; }
  </style>
</head>
<body>
  <header>🤖 Robot Shop <span>AI Assistant</span> — powered by Claude + observed by New Relic</header>
  <div id="log">
    <div class="msg bot">Hi! I'm the Robot Shop assistant. Ask me about our robots, drones, and gadgets.</div>
  </div>
  <form id="f">
    <input id="m" autocomplete="off" placeholder="e.g. What's a good starter drone?" />
    <button id="b" type="submit">Send</button>
  </form>
  <script>
    const log = document.getElementById('log'), input = document.getElementById('m'),
          btn = document.getElementById('b'), form = document.getElementById('f');
    function add(text, cls, meta) {
      const d = document.createElement('div'); d.className = 'msg ' + cls; d.textContent = text;
      if (meta) { const s = document.createElement('div'); s.className = 'meta'; s.textContent = meta; d.appendChild(s); }
      log.appendChild(d); log.scrollTop = log.scrollHeight;
    }
    form.onsubmit = async (e) => {
      e.preventDefault();
      const q = input.value.trim(); if (!q) return;
      add(q, 'user'); input.value = ''; btn.disabled = true;
      try {
        const r = await fetch('/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ message: q }) });
        const j = await r.json();
        add(j.reply, 'bot', `${j.model} · ${j.usage.input_tokens}→${j.usage.output_tokens} tok`);
      } catch (err) { add('Sorry, something went wrong: ' + err, 'bot'); }
      btn.disabled = false; input.focus();
    };
  </script>
</body>
</html>
