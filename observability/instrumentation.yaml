# Auto-instrumentation config consumed by the OTel Operator. Pods annotated with
# instrumentation.opentelemetry.io/inject-<lang>: "observability/robot-shop"
# get the matching SDK + OTLP exporter injected, pointing at the nr collector.
apiVersion: opentelemetry.io/v1alpha1
kind: Instrumentation
metadata:
  name: robot-shop
  namespace: observability
spec:
  exporter:
    endpoint: http://nr-collector.observability.svc.cluster.local:4317
  propagators:
    - tracecontext
    - baggage
    - b3
  sampler:
    type: parentbased_traceidratio
    argument: "1.0"      # sample everything for a demo
  # Per-language images pinned by the operator; resource attrs added to every signal.
  resource:
    addK8sUIDAttributes: true
  # The exporter endpoint above is the collector's gRPC port (4317). The Java agent
  # defaults to OTLP http/protobuf, which fails against a gRPC port (okhttp retry
  # errors + dropped spans) — force gRPC. (Node/Python already default to gRPC here.)
  java:
    env:
      - name: OTEL_EXPORTER_OTLP_PROTOCOL
        value: grpc
  # robot-shop's Node services run Node 14; pin an OTel JS auto-instrumentation
  # image from when Node 14 was still supported (current images need Node 16+).
  nodejs:
    image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-nodejs:0.46.0
  python: {}
