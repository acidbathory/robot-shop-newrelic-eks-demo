# ServiceAccount for the operator-managed collector. We name it explicitly in the
# OpenTelemetryCollector CR, so we must create it (the operator only auto-creates a
# SA when none is named).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nr-collector
  namespace: observability
---
# k8sattributes processor needs to read pods/namespaces/nodes/workloads so it can
# tag telemetry with K8s metadata (correlating services to pods/deployments in NR).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector-k8s
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets", "deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector-k8s
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector-k8s
subjects:
  - kind: ServiceAccount
    name: nr-collector
    namespace: observability
